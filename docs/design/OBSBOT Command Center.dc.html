      { k: 'net', t: '12:40:26', m: 'discovery: polling for device … (2000/6000 ms)' },
      { k: 'net', t: '12:40:27', m: 'discovery: polling for device … (3000/6000 ms)' },

  pushLog(k, m) { const t = new Date().toLocaleTimeString('en-GB'); this.setState(s => ({ log: [...s.log, { k, t, m }].slice(-80) })); }

  doWake() { this.setState({ run: 'awake' }, () => this.pushLog('ok', 'run state → awake')); }
  doSleep() { this.setState({ run: 'sleep' }, () => this.pushLog('warn', 'run state → sleep')); }
  doCenter() { this.setState({ pan: 0, tilt: 0, activePreset: null }, () => this.pushLog('cmd', 'gimbal → center (home)')); }
  nudge(dx, dy) {
    if (!this.isConnected()) return;
    const s = 0.14;
    this.setState(st => ({ pan: Math.max(-1, Math.min(1, +(st.pan + dx * s).toFixed(3))), tilt: Math.max(-1, Math.min(1, +(st.tilt + dy * s).toFixed(3))) }),

  }

  zoomReset() { this.setState({ zoom: 1 }, () => this.pushLog('cmd', 'zoom reset 1.00x')); }
  setAI(v) { this.setState({ ai: v }, () => this.pushLog('cmd', 'ai_mode → ' + v)); }
  setConn(v) { this.setState({ conn: v }, () => this.pushLog(v === 'connected' ? 'ok' : v === 'discovering' ? 'net' : 'warn', v === 'connected' ? 'link up · device online' : v === 'discovering' ? 'discovery: scanning /dev/video* …' : 'link down · no device')); }

    const upd = (ev) => {

      const ny = Math.max(-1, Math.min(1, ((ev.clientY - rect.top) / rect.height * 2 - 1)));

      const dt = Math.min(0.05, (now - this._lastT) / 1000); this._lastT = now;

      }
      this._raf = requestAnimationFrame(tick);
    };
    this._raf = requestAnimationFrame(tick);
    const move = (ev) => upd(ev);

  }

      items.map(it => { const on = it.v === val; return h('button', { key: it.v, onClick: () => { if (!opts.disabled) onPick(it.v); }, disabled: opts.disabled, style: { border: 'none', cursor: opts.disabled ? 'not-allowed' : 'pointer', fontFamily: 'var(--font-chrome)', fontSize: 12, letterSpacing: '0.02em', padding: '5px 11px', borderRadius: 6, background: on ? 'var(--accent-tint)' : 'transparent', color: on ? 'var(--accent-soft)' : 'var(--fg-dim)', boxShadow: on ? 'inset 0 0 0 1px var(--accent-deep)' : 'none', opacity: opts.disabled ? 0.5 : 1, transition: 'all .15s' } }, it.label); }));

      h('input', { type: 'range', min, max, step, value: v, disabled, onInput: e => this.setState({ [key]: +e.target.value }), style: { width: '100%', accentColor: 'var(--accent)', cursor: disabled ? 'not-allowed' : 'pointer' } }));

      h('div', {}, this.lbl(label), desc ? h('div', { style: { fontSize: 11.5, color: 'var(--fg-dimmer)', marginTop: 3, fontFamily: 'var(--font-prose)', letterSpacing: 0, textTransform: 'none' } }, desc) : null),
